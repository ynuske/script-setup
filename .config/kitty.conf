# Define a opacidade do fundo (0.0 é totalmente transparente, 1.0 é opaco)
background_opacity 0.8

# Opcional: mantém o fundo opaco se você colocar uma imagem de fundo
dynamic_background_opacity yes

# Espaçamento interno (ajuste o 15 para mais ou menos margem)
window_padding_width 15

# Opcional: se quiser margens diferentes para os lados e topo/fundo
# window_padding_width 15 20
